<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="CLASS" height="810px" preserveAspectRatio="none" style="width:583px;height:810px;background:#000000;" version="1.1" viewBox="0 0 583 810" width="583px" zoomAndPan="magnify"><title>Evo Framework AI vs OpenClaw &#8212; Summary</title><defs/><g><text fill="#FFFFFF" font-family="Verdana" font-size="22" font-weight="bold" lengthAdjust="spacing" textLength="550.0215" x="15" y="37.1182">Evo Framework AI vs OpenClaw &#8212; Summary</text><g class="entity" data-entity="EVO" data-source-line="25" data-uid="ent0002" id="entity_EVO"><rect fill="#90EE90" height="333.249" rx="2.5" ry="2.5" style="stroke:#FFFFFF;stroke-width:1;" width="218.7666" x="187.6274" y="59.7373"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="145.5576" x="224.2319" y="75.8125">Evo Framework AI</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="188.6274" x2="405.394" y1="80.752" y2="80.752"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="85.9756" x="193.6274" y="98.8271">Security: A</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="206.7666" x="193.6274" y="115.8418">0 CVEs, Rust memory safety,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="148.4424" x="193.6274" y="132.8564">post-quantum crypto</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="188.6274" x2="405.394" y1="139.7959" y2="139.7959"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="102.5938" x="193.6274" y="157.8711">Scalability: A</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="147.2803" x="193.6274" y="174.8857">WASM, native, edge,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="129.6914" x="193.6274" y="191.9004">distributed bridge,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="117.0176" x="193.6274" y="208.915">0 token codegen</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="188.6274" x2="405.394" y1="215.8545" y2="215.8545"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="55.7129" x="193.6274" y="233.9297">Cost: A</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="110.3252" x="193.6274" y="250.9443">$0.28/package,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="112.0889" x="193.6274" y="267.959">no subscription,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="115.8486" x="193.6274" y="284.9736">4-7x less tokens</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="188.6274" x2="405.394" y1="291.9131" y2="291.9131"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="121.96" x="193.6274" y="309.9883">Performance: A</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="104.2959" x="193.6274" y="327.0029">Rust compiled,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="123.4297" x="193.6274" y="344.0176">zero-copy binary,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="147.2119" x="193.6274" y="361.0322">nanosecond dispatch</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="188.6274" x2="405.394" y1="367.9717" y2="367.9717"/><line style="stroke:#FFFFFF;stroke-width:1;" x1="188.6274" x2="405.394" y1="369.9717" y2="369.9717"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="93.1055" x="193.6274" y="386.0469">OVERALL: A</text></g><g class="entity" data-entity="OC" data-source-line="48" data-uid="ent0003" id="entity_OC"><rect fill="#FF6347" height="350.2637" rx="2.5" ry="2.5" style="stroke:#FFFFFF;stroke-width:1;" width="204.2402" x="195.1274" y="452.7373"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="78.9414" x="257.7769" y="468.8125">OpenClaw</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="196.1274" x2="398.3677" y1="473.752" y2="473.752"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="84.2119" x="201.1274" y="491.8271">Security: F</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="72.208" x="201.1274" y="508.8418">512 CVEs,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="141.5313" x="201.1274" y="525.8564">386 malicious skills,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="192.2402" x="201.1274" y="542.8711">CVE-2026-25253 CVSS 8.8</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="196.1274" x2="398.3677" y1="549.8105" y2="549.8105"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="101.8555" x="201.1274" y="567.8857">Scalability: C</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="138.2227" x="201.1274" y="584.9004">Kubernetes scaling,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="150.3564" x="201.1274" y="601.915">Node.js single-agent,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="135.4131" x="201.1274" y="618.9297">no code generation</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="196.1274" x2="398.3677" y1="625.8691" y2="625.8691"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="67.1152" x="213.1274" y="643.9443">Cost: C+</text><polygon fill="none" points="206.1274,652.8911,202.1274,658.8911,210.1274,658.8911" style="stroke:#000000;stroke-width:1;"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="110.3252" x="213.1274" y="660.959">$1.50/package,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="163.5088" x="213.1274" y="677.9736">optional $39/mo cloud,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="128.4336" x="213.1274" y="694.9883">hidden audit costs</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="196.1274" x2="398.3677" y1="701.9277" y2="701.9277"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="127.9414" x="201.1274" y="720.0029">Performance: C-</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="107.5293" x="201.1274" y="737.0176">Node.js V8 JIT,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="131.4619" x="201.1274" y="754.0322">JSON serialization,</text><text fill="#FFFFFF" font-family="Verdana" font-size="14" lengthAdjust="spacing" textLength="188.8838" x="201.1274" y="771.0469">single-threaded event loop</text><line style="stroke:#FFFFFF;stroke-width:1;" x1="196.1274" x2="398.3677" y1="777.9863" y2="777.9863"/><line style="stroke:#FFFFFF;stroke-width:1;" x1="196.1274" x2="398.3677" y1="779.9863" y2="779.9863"/><text fill="#FFFFFF" font-family="Verdana" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="99.0869" x="201.1274" y="796.0615">OVERALL: C-</text></g><!--link EVO to OC--><!--SRC=[TPJXRjCm4CU_vobkNIMaq7HPksuTqf1ArAADig0LbGy88IUvjLuTEzXEHuU6U0YUa2VXug